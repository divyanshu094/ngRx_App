<ion-header class="bg-white/95 border-b border-slate-200/80 backdrop-blur-xl">
  <ion-toolbar class="py-3 px-0">
    <ion-buttons slot="start" *ngIf="showBackButton">
      <ion-back-button defaultHref="/" class="text-slate-700"></ion-back-button>
    </ion-buttons>

    <ion-title class="text-slate-900 font-semibold tracking-tight">{{ title || 'ShopZepto' }}</ion-title>

    <ion-buttons slot="end">
      <ion-button routerLink="/cart" class="relative rounded-full bg-slate-100 text-slate-700 shadow-sm" fill="clear">
        <ion-icon slot="icon-only" name="cart"></ion-icon>
        <ion-badge color="danger" class="badge-overlay">{{totalQuantity$ | async}}</ion-badge>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
