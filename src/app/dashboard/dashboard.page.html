            Home - 123 Main Street, Mumbai
            <ion-icon name="chevron-down" slot="end"></ion-icon>

    <!-- Search Bar -->
    <div class="mb-1">
      <ion-item
        class="rounded-[0.5rem] border border-slate-200 bg-white shadow-sm"
        fill="solid"
      >
        <ion-icon name="search" slot="start" class="text-slate-400"></ion-icon>
        <ion-input
          [value]="searchTerm()"
          placeholder="Search groceries..."
          class="text-slate-700"
          (ionInput)="onSearchChange($event)"
        >
        </ion-input>
      </ion-item>
    </div>

    <!-- Category Filters -->
    <!-- <div class="rounded-[0.5rem] px-2 py-3 overflow-x-auto scrollbar-hide"> -->
      <div class="px-2 py-2 overflow-x-auto overscroll-x-contain scroll-smooth scrollbar-hide">
      <div class="flex gap-4 w-max">
        @for (category of categories; track category.id) {
        <div
          class="flex flex-col items-center min-w-[70px] relative"
          (click)="setCategory(category.name)"
        >
          <div
            class="w-14 h-14 flex items-center justify-center overflow-hidden"
          >
            <img
              [src]="category.image"
              [alt]="category.name"
              class="w-10 h-10 object-contain"
            />
          </div>

          <p
            class="mt-2 text-[15px] font-semibold text-black whitespace-nowrap"
          >
            {{ category.name }}
          </p>
          @if (selectedCategory() === category.name) {
          <div class="absolute -bottom-2 w-12 h-1 bg-black rounded-full"></div>
          }
        </div>
        }
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 pt-2">
      @for (item of filteredGroceries() ; track item.id) {
      <app-item-card [item]="item"></app-item-card>
      }
    </div>
  </div>
</ion-content>
