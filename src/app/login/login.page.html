<ion-content fullscreen class="bg-[#f88b8b]">
  <div class="min-h-screen w-full flex items-center justify-center">
    <!-- Phone Mock Layout -->
    <div
      class="relative w-full h-screen bg-[#f5f5f5] overflow-hidden shadow-2xl rounded-none md:rounded-[40px]"
    >
      <!-- Top Section -->
      <div class="relative h-[320px] bg-[#f88c8c] overflow-hidden">
        <div class="absolute inset-0 opacity-25">
          <div
            class="absolute w-40 h-40 border border-white rounded-full top-4 left-4"
          ></div>
          <div
            class="absolute w-28 h-28 border border-white rounded-full top-20 left-20"
          ></div>
          <div
            class="absolute w-56 h-56 border border-white rounded-full top-10 right-[-80px]"
          ></div>
        </div>

        <!-- brand name section -->
        <div class="mb-8 text-left relative z-10 px-7 pt-16">
          <!-- <div
            class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-gradient-to-br from-emerald-500 to-green-600 shadow-lg"
          >
            <ion-icon name="leaf" class="text-2xl text-white"></ion-icon>
          </div> -->
          <h1 class="text-4xl font-bold text-slate-900">Softiqo</h1>
          <p class="mt-2 text-slate-600">Fresh groceries, delivered fast</p>
        </div>

        <!-- Wave -->
        <div class="absolute bottom-0 left-0 w-full">
          <svg
            viewBox="0 0 500 150"
            preserveAspectRatio="none"
            class="w-full h-24"
          >
            <path
              d="M0.00,49.98 C150.00,150.00 349.20,-50.00 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"
              class="fill-[#f5f5f5]"
            ></path>
          </svg>
        </div>
      </div>

      <!-- Form Section -->
      <div class="px-7 pb-10 -mt-10 relative z-10">
        <!-- Title -->
        <h1 class="text-4xl font-bold text-gray-800">
          Sign <span class="underline decoration-[#ff8f8f]">in</span>
        </h1>

        <!-- Form -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-10 space-y-6">
          <!-- Error Message -->
          <div *ngIf="errorMessage()" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
            {{ errorMessage() }}
          </div>

          <!-- Email -->
          <div>
            <label class="text-black text-s font-semibold"> Email </label>

            <div class="flex items-center border-b border-pink-200 py-2">
              <ion-icon
                name="mail-outline"
                class="text-gray-800 text-xl mr-2"
              ></ion-icon>

              <input
                formControlName="email"
                type="email"
                placeholder="demo@email.com"
                class="w-full outline-none bg-transparent"
              />
            </div>
            <div *ngIf="email?.invalid && email?.touched" class="text-red-500 text-xs mt-1">
              <span *ngIf="email?.errors?.['required']">Email is required</span>
              <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="text-black text-s font-semibold"> Password </label>

            <div class="flex items-center border-b border-pink-200 py-2">
              <ion-icon
                name="lock-closed-outline"
                class="text-gray-800 text-xl mr-2"
              ></ion-icon>

              <input
                formControlName="password"
                [type]="showPassword() ? 'text' : 'password'"
                placeholder="Enter your password"
                class="w-full outline-none bg-transparent"
              />

              <ion-icon
                [name]="showPassword() ? 'eye-outline' : 'eye-off-outline'"
                class="text-red-400 text-lg cursor-pointer"
                (click)="togglePasswordVisibility()"
              ></ion-icon>
            </div>
            <div *ngIf="password?.invalid && password?.touched" class="text-red-500 text-xs mt-1">
              <span *ngIf="password?.errors?.['required']">Password is required</span>
              <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
            </div>
          </div>

          <!-- Remember + Forgot -->
          <div class="flex items-center justify-between text-xs">
            <label class="flex items-center gap-2 text-gray-600">
              <input formControlName="rememberMe" type="checkbox" class="accent-pink-400" />
              Remember Me
            </label>

            <a href="#" class="text-pink-400 font-semibold">
              Forgot Password?
            </a>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            [disabled]="loginForm.invalid || isLoading()"
            class="w-full bg-[#ff8f8f] text-white py-3 rounded-xl font-semibold shadow-md active:scale-95 transition disabled:opacity-50 disabled:cursor-not-allowed"
          >
            {{ isLoading() ? 'Logging in...' : 'Login' }}
          </button>

          <!-- Signup -->
          <p class="text-center text-gray-400 text-sm">
            Don't have an Account ?
            <span
              class="text-[#ff8f8f] font-semibold cursor-pointer"
              routerLink="/register"
            >
              Sign up
            </span>
          </p>
        </form>
      </div>
    </div>
  </div>
</ion-content>
