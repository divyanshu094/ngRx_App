<app-header title="Cart" [showBackButton]="true"></app-header>

<ion-content class="ion-padding">
  <ion-list>
    @for (item of bucket$ | async; track item.id) {
    <ion-grid>
      <ion-row>
        <ion-col size="7">{{ item.name }}</ion-col>
        <ion-col size="5" class="quantity-section">
          <ion-button size="small" fill="clear" (click)="decrement(item)">
            <ion-icon name="remove"></ion-icon>
             <!-- @if (item.quantity > 1) {
            <ion-icon name="remove"></ion-icon>
            }
            @else{
            <ion-icon name="trash"></ion-icon>
            } -->
          </ion-button>

          <span class="quantity">{{ item.quantity }}</span>

          <ion-button size="small" fill="clear" (click)="increment(item)">
            <ion-icon name="add"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
    } @empty {
    <ion-item>
      No items found.
    </ion-item>
    }
  </ion-list>
</ion-content>
