<ion-content fullscreen class="bg-[#f88b8b]">
  <div class="min-h-screen w-full flex items-center justify-center">
    <!-- Phone Mock Layout -->
    <div
      class="relative w-full h-screen bg-[#f5f5f5] overflow-auto shadow-2xl rounded-none md:rounded-[40px]"
    >
      <!-- Top Section -->
      <div class="relative h-[280px] bg-[#f88c8c] overflow-hidden">
        <div class="absolute inset-0 opacity-25">
          <div
            class="absolute w-40 h-40 border border-white rounded-full top-4 left-4"
          ></div>
          <div
            class="absolute w-28 h-28 border border-white rounded-full top-20 left-20"
          ></div>
          <div
            class="absolute w-56 h-56 border border-white rounded-full top-10 right-[-80px]"
          ></div>
        </div>

        <!-- Back Button and Title -->
        <div class="relative z-10 px-7 pt-8 flex items-center justify-between">
          <button (click)="goBack()" class="text-white hover:opacity-80">
            <ion-icon name="arrow-back" class="text-2xl"></ion-icon>
          </button>
          <h1 class="text-2xl font-bold text-white flex-1 text-center">Verify Email</h1>
          <div class="w-8"></div>
        </div>

        <!-- Mail Icon -->
        <div class="flex justify-center mt-6">
          <div class="bg-white bg-opacity-20 p-6 rounded-full backdrop-blur-sm">
            <ion-icon name="mail" class="text-5xl text-white"></ion-icon>
          </div>
        </div>

        <!-- Wave -->
        <div class="absolute bottom-0 left-0 w-full">
          <svg
            viewBox="0 0 500 150"
            preserveAspectRatio="none"
            class="w-full h-24"
          >
            <path
              d="M0.00,49.98 C150.00,150.00 349.20,-50.00 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"
              class="fill-[#f5f5f5]"
            ></path>
          </svg>
        </div>
      </div>

      <!-- Form Section -->
      <div class="px-7 pb-10 -mt-6 relative z-10">
        <!-- Title and Description -->
        <div class="mb-8">
          <h2 class="text-2xl font-bold text-gray-800 mb-2">
            Verify Your Email
          </h2>
          <p class="text-gray-600 text-sm">
            We've sent a 6-digit code to <br />
            <span class="font-semibold text-gray-800">{{ email() }}</span>
          </p>
        </div>

        <!-- Success Message -->
        <div *ngIf="successMessage()" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6 flex items-center gap-2">
          <ion-icon name="checkmark-circle" class="text-xl"></ion-icon>
          {{ successMessage() }}
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage()" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
          {{ errorMessage() }}
        </div>

        <!-- Form -->
        <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <!-- OTP Input -->
          <div>
            <label class="text-black text-sm font-semibold block mb-3">Enter OTP Code</label>

            <div class="flex gap-2 mb-4">
              <input
                formControlName="otp"
                type="text"
                inputmode="numeric"
                maxlength="6"
                placeholder="000000"
                class="flex-1 text-center text-3xl font-bold tracking-widest border-2 border-pink-200 rounded-lg py-3 outline-none focus:border-pink-400 transition bg-white"
              />
            </div>

            <div *ngIf="otp?.invalid && otp?.touched" class="text-red-500 text-xs">
              <span *ngIf="otp?.errors?.['required']">OTP is required</span>
              <span *ngIf="otp?.errors?.['pattern']">OTP must be 6 digits</span>
            </div>
          </div>

          <!-- Timer -->
          <div class="text-center">
            <p class="text-gray-600 text-sm mb-2">Code expires in:</p>
            <p [class]="'text-2xl font-bold ' + (timeLeft() <= 60 ? 'text-red-500' : 'text-pink-500')">
              {{ getFormattedTime() }}
            </p>
          </div>

          <!-- Verify Button -->
          <button
            type="submit"
            [disabled]="verifyForm.invalid || isLoading() || isVerified()"
            class="w-full bg-[#ff8f8f] text-white py-3 rounded-xl font-semibold shadow-md active:scale-95 transition disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <span *ngIf="!isLoading() && !isVerified()">Verify Email</span>
            <span *ngIf="isLoading()">Verifying...</span>
            <span *ngIf="isVerified()" class="flex items-center justify-center gap-2">
              <ion-icon name="checkmark-circle"></ion-icon>
              Verified
            </span>
          </button>

          <!-- Resend OTP -->
          <div class="text-center">
            <p class="text-gray-600 text-sm mb-3">Didn't receive the code?</p>
            <button
              type="button"
              (click)="onResendOTP()"
              [disabled]="!canResend() && timerActive() || isLoading()"
              class="text-[#ff8f8f] font-semibold hover:underline disabled:opacity-50 disabled:cursor-not-allowed transition"
            >
              {{ canResend() ? 'Resend OTP' : 'Wait for timer to expire' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</ion-content>
